# Translation glossary EN → RU
#
# Last reviewed: 2026-06-04 (Stage 3c PR-C merge)
#
# Используется при переводе docs/content/**/*.md на русский.
# AI или человек должен следовать этому словарю для консистентности.
# При возникновении новых терминов — добавляйте их сюда в том же PR.
#
# Ownership: хозяин файла — тот, кто ведёт текущий Stage 3-PR (3b/3c/3d).
# При первом вхождении нового термина в переводимом файле — добавьте его сюда в том же коммите,
# чтобы следующий переводчик (человек или AI) видел принятый вариант и не выбирал свой.
#
# Формат:
#   - en: <англ. термин>
#     ru: <рекомендуемый перевод>
#     note: <когда использовать, альтернативы, исключения>
#     keep_en: true       # опционально — оставляем английский во всех контекстах
#
# YAML-заметка: в поле `note:` избегайте двоеточия с пробелом (`: `) в plain scalar —
# это ломает парсер. Используйте тире «—» или block scalar (`|`) для многострочных.

version: 1

terms:
  # —— Ключевые SDK-сущности (имена классов — не переводить) ——
  - en: B24Hook
    ru: B24Hook
    note: Имя класса SDK — НИКОГДА не переводить. Пример — «инициализируйте B24Hook через `fromWebhookUrl()`».
    keep_en: true
  - en: B24Frame
    ru: B24Frame
    keep_en: true
  - en: B24OAuth
    ru: B24OAuth
    keep_en: true

  # —— Бренд / платформа ——
  - en: Bitrix24
    ru: Bitrix24
    note: Бренд платформы — НЕ переводить на «Битрикс24» в теле текста. Исключение — блоки копирайта в footer/LICENSE (там «Bitrix» или «Битрикс»).
    keep_en: true
  - en: Bitrix24 REST API
    ru: REST API Bitrix24
    note: При прилагательной форме («Bitrix24 REST API method») — «метод REST API Bitrix24».
  - en: Bitrix24 webhook URL
    ru: URL вебхука Bitrix24
  - en: portal
    ru: портал
    note: «Портал Bitrix24» — полный экземпляр Bitrix24 клиента. Альтернатива — «аккаунт» в явно «пользовательсковском» контексте.
  - en: portal domain
    ru: домен портала

  # —— Общие понятия интеграции ——
  - en: webhook
    ru: вебхук
    note: Устоявшийся русский вариант. Не «хук».
  - en: hook
    ru: вебхук
    note: |
      Два разных случая:
      1. Слово «hook» в прозе как синоним webhook («set up a hook») → «вебхук» («настроить вебхук»).
      2. Имя класса SDK `B24Hook` — НИКОГДА не трогать. Не «B24Вебхук», не «Вебхук-клиент».
  - en: callback
    ru: callback
    note: |
      Не переводить на «обратный вызов» — устоявшийся тех. термин.
      «pass a callback» → «передать callback».
      НО — «error handler» / «error callback» в роли «обработчик ошибок» → «обработчик ошибок» (handler-перевод побеждает при конструкции «... handler»).
    keep_en: true
  - en: handler
    ru: обработчик
    note: «error handler» → «обработчик ошибок» (предпочтительнее «error callback»).
  - en: frame
    ru: фрейм
    note: Контекст — iframe-приложение Bitrix24. При прямом указании на HTML iframe — сохранять «iframe».
  - en: iframe
    ru: iframe
    keep_en: true
  - en: slider
    ru: слайдер
    note: UI-элемент Bitrix24.
  - en: placement
    ru: placement
    note: Термин Bitrix24 (место размещения приложения). Сохраняем английский. НЕ «размещение» и не «позиция» — потеряется тех. специфика.
    keep_en: true
  - en: event
    ru: событие
  - en: event handler
    ru: обработчик события

  # —— Менеджеры и хелперы (Stage 3c PR-B) ——
  - en: helper
    ru: хелпер
    note: |
      «helper» в прозе → «хелпер» («through the helper» → «через хелпер»).
      Имена классов SDK (`B24HelperManager`, `ProfileManager`, `AppManager` и пр.) — НЕ переводить.
  - en: limiter
    ru: лимитер
    note: Компонент SDK (ограничитель частоты запросов). «limiter state» → «состояние лимитера». Сам термин «rate limit» — keep_en (см. раздел «Ограничения и ретраи»).
  - en: handshake
    ru: рукопожатие
    note: OAuth/postMessage handshake → «рукопожатие». «getInitData handshake» → «рукопожатие getInitData».
  - en: bucket
    ru: корзина
    note: В контексте `SelectedCRM` — массив элементов по типу сущности. «bucket» → «корзина».
  - en: closure
    ru: замыкание
    note: JS-замыкание. «closure-based composable» → «composable на основе замыкания».
  - en: self-hosted
    ru: self-hosted
    note: Коробочная версия Bitrix24. Оставляем английский («self-hosted», «self-hosted-портал»). Антоним — «облако» (cloud).
    keep_en: true

  # —— Core / ошибки / логирование (Stage 3c PR-C) ——
  - en: singleton
    ru: синглтон
    note: Паттерн. «Browser/Text/Type — синглтон».
  - en: type guard
    ru: type guard
    note: TypeScript type guard. Не переводим. «каждый метод — type guard».
    keep_en: true
  - en: redaction
    ru: редактирование
    note: |
      В контексте логов — «редактирование учётных данных» (вырезание секретов).
      «redact» → «редактировать», «redacted» → «отредактированный».
  - en: sink
    ru: sink
    note: Приёмник логов (log sink). Оставляем английский — «удалённый sink».
    keep_en: true
  - en: hard error
    ru: hard-ошибка
    note: «hard» (выбрасывается) / «soft» (возвращается в AjaxResult) — оставляем английские hard/soft.
  - en: soft error
    ru: soft-ошибка

  # —— Vue / Nuxt экосистема ——
  - en: composable
    ru: composable
    note: Термин Vue 3. Сохраняем английский. «is a composable» → «является composable» или «это composable-функция».
    keep_en: true
  - en: plugin
    ru: плагин
    note: Nuxt-плагин. «register as a plugin» → «зарегистрируйте как плагин».
  - en: module
    ru: модуль
    note: Nuxt-модуль. Но ES-модуль в контексте import/export также «модуль».
  - en: middleware
    ru: middleware
    note: Nuxt-middleware. Сохраняем английский, в прямой речи можно «промежуточный слой».
    keep_en: true
  - en: ref
    ru: ref
    note: Vue Composition API — `ref(...)`. Не переводим.
    keep_en: true
  - en: reactive
    ru: реактивный
    note: Как прилагательное — «реактивный объект». Как API — `reactive(...)` — не трогать.

  # —— Автентификация ——
  - en: OAuth
    ru: OAuth
    keep_en: true
  - en: OAuth 2.0
    ru: OAuth 2.0
    keep_en: true
  - en: scope
    ru: scope
    note: В контексте OAuth — «scope» без перевода. Альтернатива — «область доступа» (редко).
    keep_en: true
  - en: token
    ru: токен
  - en: access token
    ru: access token
    note: Не «токен доступа». Оставляем английский термин.
    keep_en: true
  - en: refresh token
    ru: refresh token
    keep_en: true
  - en: application token
    ru: application token
    keep_en: true
  - en: secret
    ru: секрет
  - en: client ID
    ru: client ID
    keep_en: true
  - en: client secret
    ru: client secret
    keep_en: true

  # —— HTTP / запросы ——
  - en: request
    ru: запрос
  - en: response
    ru: ответ
  - en: payload
    ru: payload
    note: Альтернатива — «полезная нагрузка» (редко). Чаще оставляем «payload».
    keep_en: true
  - en: endpoint
    ru: endpoint
    keep_en: true
  - en: header
    ru: заголовок
    note: В контексте HTTP-заголовков.
  - en: status code
    ru: код статуса
  - en: HTTP method
    ru: HTTP-метод
  - en: method (REST)
    ru: метод
    note: В контексте REST API — «метод». Не «вызов» (call) и не «функция».

  # —— Пагинация и фильтрация ——
  - en: pagination
    ru: пагинация
  - en: filter
    ru: фильтр
  - en: sort
    ru: сортировка
  - en: order
    ru: порядок
    note: В запросах — синоним сортировки. В REST параметре `order` оставляем как есть.
  - en: limit
    ru: лимит
  - en: offset
    ru: offset
    keep_en: true
  - en: select
    ru: выборка
    note: В SQL/REST смысле. Параметр `select` в коде не трогать.

  # —— Батчинг / пакетные операции ——
  - en: batch
    ru: батч
    note: Альтернатива — «пакетный запрос» (в первом вхождении). Дальше — «батч».
  - en: batch request
    ru: пакетный запрос
  - en: chunk
    ru: чанк
    note: При первом вхождении — «чанк (chunk)». Дальше «чанк».
  - en: bulk
    ru: массовый
    note: «Bulk update» → «массовое обновление».

  # —— Ограничения и ретраи ——
  - en: rate limit
    ru: rate limit
    note: Оставляем английский. При первом вхождении — «ограничение частоты запросов (rate limit)».
    keep_en: true
  - en: throttle
    ru: throttle
    keep_en: true
  - en: debounce
    ru: debounce
    keep_en: true
  - en: retry
    ru: повторный запрос
    note: «retry on error» → «повторный запрос при ошибке». Бывает «ретрай».
  - en: backoff
    ru: backoff
    note: Альтернатива — «экспоненциальная задержка».
    keep_en: true
  - en: timeout
    ru: таймаут

  # —— Асинхронность и потоки ——
  - en: async
    ru: async
    note: «sync/async function» → «синхронная/асинхронная функция».
    keep_en: true
  - en: promise
    ru: Promise
    keep_en: true
  - en: generator
    ru: генератор
  - en: stream
    ru: поток
  - en: streaming
    ru: потоковая обработка
  - en: queue
    ru: очередь

  # —— Логирование / ошибки ——
  - en: logger
    ru: логгер
  - en: log
    ru: лог
  - en: error
    ru: ошибка
  - en: warning
    ru: предупреждение
  - en: formatter
    ru: форматтер
  - en: processor
    ru: процессор

  # —— Общие эффекты и модификаторы ——
  - en: deprecated
    ru: устаревший
    note: Часто в оборотах «устарел», «устаревший метод». Слово «deprecated» в коде не трогаем.
  - en: legacy
    ru: legacy
    note: «Legacy code» → «legacy-код». «Legacy method» → «метод из legacy API».
    keep_en: true
  - en: optional
    ru: опциональный
  - en: required
    ru: обязательный
  - en: default
    ru: по умолчанию
  - en: by default
    ru: по умолчанию
  - en: production
    ru: production
    keep_en: true
  - en: development
    ru: dev / development
    note: «development mode» → «режим разработки».
    keep_en: true
  - en: runtime
    ru: runtime
    keep_en: true
  - en: build
    ru: сборка
  - en: bundle
    ru: бандл

  # —— Стандартные обороты doca ——
  - en: Note
    ru: Примечание
  - en: Tip
    ru: Совет
  - en: Warning
    ru: Предупреждение
  - en: Caution
    ru: Внимание
  - en: Example
    ru: Пример
  - en: Quick Start
    ru: Быстрый старт
  - en: Get Started
    ru: Начать
  - en: Overview
    ru: Обзор
  - en: See Also
    ru: См. также
  - en: Limitations
    ru: Ограничения
  - en: Key Concepts
    ru: Ключевые понятия
  - en: Method Signature
    ru: Сигнатура метода
  - en: Parameters
    ru: Параметры
  - en: Returns
    ru: Возвращает
  - en: Throws
    ru: Выбрасывает
  - en: Error Handling
    ru: Обработка ошибок
  - en: Usage
    ru: Использование
  - en: Installation
    ru: Настройка
  - en: Configuration
    ru: Настройка
