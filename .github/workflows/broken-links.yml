name: Broken links (internal only)

on:
  schedule:
    # Каждый понедельник в 06:00 UTC (09:00 MSK)
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Link Checker (internal only)
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # --exclude '^https?://' и '^mailto:' оставляет только относительные/якорные ссылки
          # --include-fragments проверяет #anchor (нужно для проверки {#en-anchor} якорей)
          # --cache ускоряет повторные прогоны
          args: >-
            --no-progress
            --cache
            --max-cache-age 1d
            --include-fragments
            --exclude '^https?://'
            --exclude '^mailto:'
            './docs/content/**/*.md'
          fail: false

      - name: Create issue from failure
        if: env.lychee_exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Broken internal links detected (weekly check)'
          content-filepath: ./lychee/out.md
          labels: |
            broken-links
            ci
            automated
