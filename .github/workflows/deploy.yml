name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one Pages deploy at a time. Do NOT cancel in-progress — we want the
# triggered deploy to finish so the artifact actually reaches Pages.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Nuxt
        run: pnpm run docs:prepare

      - name: Build static site
        run: pnpm run docs:generate

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Smoke-test — убеждаемся, что сайт реально доступен в prod (с retry на propagation).
      - name: Smoke test deployed site
        run: |
          URL="${{ steps.deployment.outputs.page_url }}"
          echo "Smoke testing $URL"
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 15 "$URL" > /dev/null; then
              echo "✓ site reachable on attempt $i"
              exit 0
            fi
            echo "… attempt $i failed, retrying in 10s"
            sleep 10
          done
          echo "✗ site not reachable after 5 attempts"
          exit 1
