version: 2
updates:
  # pnpm-workspace: единый lockfile в КОРНЕ. Поэтому все npm-зависимости
  # (корневые и docs/) обновляет одна корневая экосистема — она workspace-aware
  # и правит корневой pnpm-lock.yaml.
  #
  # Отдельная "/docs"-экосистема здесь НЕ работает: она меняет docs/package.json,
  # но корневой lockfile не трогает → `pnpm install --frozen-lockfile` в CI падает.
  # Не заводить её обратно.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Moscow"
    # Major-обновления Nuxt/Vue и их соседей обычно требуют миграции (проверяем руками):
    ignore:
      - dependency-name: "nuxt"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@nuxt/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vue"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vue-tsc"
        update-types: ["version-update:semver-major"]
    groups:
      bitrix24:
        patterns:
          - "@bitrix24/*"
      nuxt:
        patterns:
          - "nuxt"
          - "@nuxt/*"
          - "nuxt-*"
          - "@nuxtjs/*"
      vue:
        patterns:
          - "vue"
          - "@vue/*"
          - "vue-*"
          - "@vueuse/*"
      content-tooling:
        patterns:
          - "remark-*"
          - "shiki"
          - "@shikijs/*"
          - "minimark"
          - "@comark/*"
          - "tiptap-*"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    open-pull-requests-limit: 5

  # GitHub Actions — обновление версий actions/*
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Moscow"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    open-pull-requests-limit: 3
